# compose.yaml — Phase 5: controller + USB pass-through.
#
# Two-container, two-router, federated topology. Robot runs the
# Interbotix xs_sdk controller with USB device pass-through; dev
# runs rviz2 for visualization (deferred to Phase 6).
#
# Usage:
#   docker compose build        # build both images
#   xhost +local:docker         # allow containers to reach XWayland
#   docker compose up           # brings up both containers
#   docker compose down         # tears down

name: px100

networks:
  default:
    name: px100-net

x-build-common: &build-common
  context: ./docker
  dockerfile: Dockerfile

x-xwayland: &xwayland
  DISPLAY: ${DISPLAY:-:0}
  QT_QPA_PLATFORM: xcb

services:
  robot:
    image: px100-robot:dev
    build:
      <<: *build-common
      args:
        BASE_IMAGE: ros:lyrical-ros-base-resolute
        BUILD_INTERBOTIX: "true"
    container_name: robot
    init: true
    ports:
      - "7447:7447"
    devices:
      - /dev/ttyDXL:/dev/ttyDXL
    command:
      - bash
      - -c
      - |
        ros2 launch interbotix_xsarm_control xsarm_control.launch.py \
          robot_model:=px100 \
          use_rviz:=false

  dev:
    image: px100-dev:dev
    build:
      <<: *build-common
      args:
        BASE_IMAGE: osrf/ros:lyrical-desktop-full-resolute
        EXTRA_PKGS: ros-lyrical-joint-state-publisher-gui libxcb-cursor0
    container_name: dev
    init: true
    depends_on:
      - robot
    environment:
      <<: *xwayland
      ZENOH_CONFIG_OVERRIDE: 'connect/endpoints=["tcp/robot:7447"]'
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    command:
      - bash
      - -c
      - |
        rviz2
