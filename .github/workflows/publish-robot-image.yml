# Builds the px100-robot image and publishes it to GitHub Container
# Registry (GHCR) at ghcr.io/<owner>/px100-robot.
#
# Triggered MANUALLY only (workflow_dispatch) — the Interbotix workspace
# build is heavy, so we don't rebuild on every push. Run it from the
# GitHub "Actions" tab ("Run workflow"), or with: gh workflow run
# publish-robot-image.yml -f tag=lyrical
name: Publish px100-robot image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. lyrical, phase5)"
        required: true
        default: "lyrical"

permissions:
  contents: read      # to check out the repo
  packages: write     # to push to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # The GitHub-hosted runner has limited disk; the workspace build
      # (clang toolchain + 26-package colcon build) can exhaust it.
      # Free ~20 GB of preinstalled toolchains we don't need.
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # provided automatically; no PAT needed to PUSH

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push px100-robot
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            BASE_IMAGE=ros:lyrical-ros-base-resolute
            BUILD_INTERBOTIX=true
          # Two tags: the human-friendly one you chose, plus the exact
          # commit SHA so every image is traceable to its source.
          tags: |
            ghcr.io/${{ github.repository_owner }}/px100-robot:${{ inputs.tag }}
            ghcr.io/${{ github.repository_owner }}/px100-robot:${{ github.sha }}
